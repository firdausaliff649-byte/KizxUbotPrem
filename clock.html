<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .btn.active {
            background: white;
            color: #667eea;
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .clock-card.favorite {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
        }

        .timezone-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .favorite-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .favorite-btn:hover {
            transform: scale(1.2);
        }

        .favorite-btn.starred {
            color: #ffd700;
        }

        .time-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            text-align: center;
            letter-spacing: 2px;
        }

        .clock-card.favorite .time-display {
            color: #ff6b6b;
        }

        .date-display {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #666;
        }

        .info-label {
            font-weight: 600;
        }

        .info-value {
            color: #333;
        }

        .analog-clock {
            width: 120px;
            height: 120px;
            border: 3px solid #667eea;
            border-radius: 50%;
            position: relative;
            margin: 15px auto;
            background: white;
        }

        .clock-card.favorite .analog-clock {
            border-color: #ff6b6b;
        }

        .hand {
            position: absolute;
            background: #333;
            transform-origin: bottom center;
            left: 50%;
            bottom: 50%;
        }

        .hour-hand {
            width: 4px;
            height: 30px;
            margin-left: -2px;
            background: #667eea;
        }

        .clock-card.favorite .hour-hand {
            background: #ff6b6b;
        }

        .minute-hand {
            width: 3px;
            height: 40px;
            margin-left: -1.5px;
            background: #764ba2;
        }

        .clock-card.favorite .minute-hand {
            background: #ff8787;
        }

        .second-hand {
            width: 2px;
            height: 45px;
            margin-left: -1px;
            background: #ff6b6b;
        }

        .center-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #667eea;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .clock-card.favorite .center-dot {
            background: #ff6b6b;
        }

        .format-toggle {
            text-align: center;
            margin: 10px 0;
        }

        .toggle-btn {
            background: #f0f0f0;
            border: 1px solid #ddd;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .toggle-btn:hover {
            background: #e0e0e0;
        }

        .add-timezone {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        .add-timezone h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .timezone-input {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .timezone-input select,
        .timezone-input button {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .timezone-input select {
            flex: 1;
            min-width: 200px;
        }

        .timezone-input button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .timezone-input button:hover {
            background: #764ba2;
        }

        .favorites-section {
            margin-bottom: 40px;
        }

        .favorites-section h2 {
            color: white;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .current-time {
            font-size: 0.9em;
            color: #999;
            margin-top: 10px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .clock-grid {
                grid-template-columns: 1fr;
            }

            .time-display {
                font-size: 2em;
            }

            .analog-clock {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕐 Multi-Timezone Clock</h1>
            <p>Track time across the world in real-time</p>
        </div>

        <div class="controls">
            <button class="btn active" onclick="toggleFormat()">24-Hour Format</button>
            <button class="btn" onclick="toggleClockType()">Show/Hide Analog</button>
            <button class="btn" onclick="showAllTimezones()">Show All Zones</button>
            <button class="btn" onclick="clearFavorites()">Clear Favorites</button>
        </div>

        <div class="favorites-section">
            <h2>⭐ Favorites</h2>
            <div id="favorites-grid" class="clock-grid"></div>
            <div id="favorites-empty" class="empty-message" style="display: none;">
                Mark timezones as favorite to see them here
            </div>
        </div>

        <div class="add-timezone">
            <h3>➕ Add Timezone</h3>
            <div class="timezone-input">
                <select id="timezone-select">
                    <option value="">Select a timezone...</option>
                </select>
                <button onclick="addTimezone()">Add</button>
            </div>
        </div>

        <h2 style="color: white; margin-top: 40px; margin-bottom: 20px;">All Timezones</h2>
        <div id="clock-grid" class="clock-grid"></div>
    </div>

    <script>
        // Timezone data
        const timezones = [
            { name: 'London', zone: 'Europe/London', offset: 0 },
            { name: 'New York', zone: 'America/New_York', offset: -5 },
            { name: 'Los Angeles', zone: 'America/Los_Angeles', offset: -8 },
            { name: 'Tokyo', zone: 'Asia/Tokyo', offset: 9 },
            { name: 'Sydney', zone: 'Australia/Sydney', offset: 10 },
            { name: 'Dubai', zone: 'Asia/Dubai', offset: 4 },
            { name: 'Singapore', zone: 'Asia/Singapore', offset: 8 },
            { name: 'Hong Kong', zone: 'Asia/Hong_Kong', offset: 8 },
            { name: 'Mumbai', zone: 'Asia/Kolkata', offset: 5.5 },
            { name: 'Bangkok', zone: 'Asia/Bangkok', offset: 7 },
            { name: 'Paris', zone: 'Europe/Paris', offset: 1 },
            { name: 'Berlin', zone: 'Europe/Berlin', offset: 1 },
            { name: 'Moscow', zone: 'Europe/Moscow', offset: 3 },
            { name: 'Cairo', zone: 'Africa/Cairo', offset: 2 },
            { name: 'São Paulo', zone: 'America/Sao_Paulo', offset: -3 },
            { name: 'Mexico City', zone: 'America/Mexico_City', offset: -6 },
            { name: 'Toronto', zone: 'America/Toronto', offset: -5 },
            { name: 'Vancouver', zone: 'America/Vancouver', offset: -8 },
            { name: 'Istanbul', zone: 'Europe/Istanbul', offset: 3 },
            { name: 'Bangkok', zone: 'Asia/Bangkok', offset: 7 },
            { name: 'Seoul', zone: 'Asia/Seoul', offset: 9 },
            { name: 'Jakarta', zone: 'Asia/Jakarta', offset: 7 },
            { name: 'Manila', zone: 'Asia/Manila', offset: 8 },
            { name: 'Bangkok', zone: 'Asia/Bangkok', offset: 7 },
            { name: 'Johannesburg', zone: 'Africa/Johannesburg', offset: 2 },
            { name: 'Lagos', zone: 'Africa/Lagos', offset: 1 },
        ];

        let favorites = [];
        let displayedTimezones = [];
        let is24HourFormat = true;
        let showAnalog = true;

        // Initialize
        function init() {
            populateTimezoneSelect();
            addDefaultTimezones();
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        function populateTimezoneSelect() {
            const select = document.getElementById('timezone-select');
            timezones.forEach(tz => {
                const option = document.createElement('option');
                option.value = tz.zone;
                option.textContent = tz.name + ' (' + tz.zone + ')';
                select.appendChild(option);
            });
        }

        function addDefaultTimezones() {
            displayedTimezones = [
                'Europe/London',
                'America/New_York',
                'Asia/Tokyo',
                'Australia/Sydney'
            ];
        }

        function getTimezoneInfo(zone) {
            return timezones.find(tz => tz.zone === zone) || { name: zone, zone: zone };
        }

        function updateClocks() {
            updateClockGrid('favorites-grid', favorites);
            updateClockGrid('clock-grid', displayedTimezones);
            updateFavoritesEmpty();
        }

        function updateClockGrid(gridId, zones) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';

            zones.forEach(zone => {
                const tzInfo = getTimezoneInfo(zone);
                const card = createClockCard(zone, tzInfo);
                grid.appendChild(card);
            });
        }

        function createClockCard(zone, tzInfo) {
            const card = document.createElement('div');
            card.className = 'clock-card';
            if (favorites.includes(zone)) {
                card.classList.add('favorite');
            }

            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: zone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: !is24HourFormat,
            });

            const dateFormatter = new Intl.DateTimeFormat('en-US', {
                timeZone: zone,
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric',
            });

            const timeStr = formatter.format(now);
            const dateStr = dateFormatter.format(now);

            // Get timezone offset
            const formatter2 = new Intl.DateTimeFormat('en-US', {
                timeZone: zone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
            });

            const zonedDate = new Date(now.toLocaleString('en-US', { timeZone: zone }));
            const offset = (zonedDate - now) / (1000 * 60 * 60);
            const offsetStr = offset >= 0 ? `UTC+${offset.toFixed(1)}` : `UTC${offset.toFixed(1)}`;

            const isFavorite = favorites.includes(zone);

            card.innerHTML = `
                <div class="timezone-name">
                    <span>${tzInfo.name}</span>
                    <button class="favorite-btn ${isFavorite ? 'starred' : ''}" onclick="toggleFavorite('${zone}')">
                        ${isFavorite ? '⭐' : '☆'}
                    </button>
                </div>

                <div class="date-display">${dateStr}</div>

                ${showAnalog ? `
                    <div class="analog-clock">
                        <div class="hand hour-hand" style="transform: rotate(${(zonedDate.getHours() % 12) * 30 + zonedDate.getMinutes() * 0.5}deg)"></div>
                        <div class="hand minute-hand" style="transform: rotate(${zonedDate.getMinutes() * 6 + zonedDate.getSeconds() * 0.1}deg)"></div>
                        <div class="hand second-hand" style="transform: rotate(${zonedDate.getSeconds() * 6}deg)"></div>
                        <div class="center-dot"></div>
                    </div>
                ` : ''}

                <div class="time-display">${timeStr}</div>

                <div class="info-row">
                    <span class="info-label">Timezone:</span>
                    <span class="info-value">${zone}</span>
                </div>

                <div class="info-row">
                    <span class="info-label">UTC Offset:</span>
                    <span class="info-value">${offsetStr}</span>
                </div>

                <div class="format-toggle">
                    <button class="toggle-btn" onclick="removeTimezone('${zone}')">Remove</button>
                </div>
            `;

            return card;
        }

        function toggleFavorite(zone) {
            const index = favorites.indexOf(zone);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(zone);
            }
            updateClocks();
        }

        function addTimezone() {
            const select = document.getElementById('timezone-select');
            const zone = select.value;
            
            if (zone && !displayedTimezones.includes(zone)) {
                displayedTimezones.push(zone);
                updateClocks();
                select.value = '';
            }
        }

        function removeTimezone(zone) {
            const index = displayedTimezones.indexOf(zone);
            if (index > -1) {
                displayedTimezones.splice(index, 1);
            }
            const favIndex = favorites.indexOf(zone);
            if (favIndex > -1) {
                favorites.splice(favIndex, 1);
            }
            updateClocks();
        }

        function toggleFormat() {
            is24HourFormat = !is24HourFormat;
            updateClocks();
        }

        function toggleClockType() {
            showAnalog = !showAnalog;
            updateClocks();
        }

        function showAllTimezones() {
            displayedTimezones = timezones.map(tz => tz.zone);
            updateClocks();
        }

        function clearFavorites() {
            if (confirm('Clear all favorites?')) {
                favorites = [];
                updateClocks();
            }
        }

        function updateFavoritesEmpty() {
            const empty = document.getElementById('favorites-empty');
            empty.style.display = favorites.length === 0 ? 'block' : 'none';
        }

        // Start the clock
        init();
    </script>
</body>
</html>
